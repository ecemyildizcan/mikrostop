<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikrop Avcıları: Test Görevi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Baloo 2', cursive;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        .font-baloo-bold { font-weight: 800; }
        
        .game-card {
            background: rgba(30, 41, 59, 1);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            width: 95%;
            max-width: 700px;
            height: auto;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            padding: 2rem;
        }

        #question-view {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }

        .btn-game {
            transition: all 0.2s;
            border-bottom: 4px solid rgba(0,0,0,0.4);
            cursor: pointer;
            font-weight: 700;
        }
        .btn-game:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-game:active { transform: translateY(2px); border-bottom-width: 1px; }

        #start-screen {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .game-input {
            width: 100%;
            max-width: 350px;
            padding: 1rem 1.5rem;
            border-radius: 1.2rem;
            background: rgba(30, 41, 59, 0.8);
            border: 3px solid rgba(59, 130, 246, 0.4);
            color: white;
            font-size: 1.3rem;
            font-family: 'Baloo 2', cursive;
            outline: none;
            margin-bottom: 1rem;
            text-align: center;
        }

        .game-input:focus { border-color: #3b82f6; background: #1e293b; }

        .bounce-mikrop { animation: mini-bounce-right 2s infinite ease-in-out; }
        .bounce-kahraman { animation: mini-bounce-left 2s infinite ease-in-out; animation-delay: 0.5s; }

        @keyframes mini-bounce-right { 0%, 100% { transform: translateY(0) rotate(5deg); } 50% { transform: translateY(-25px) rotate(-5deg); } }
        @keyframes mini-bounce-left { 0%, 100% { transform: translateY(0) rotate(5deg); } 50% { transform: translateY(-25px) rotate(5deg); } }

        .progress-container {
            width: 100%;
            background: rgba(0,0,0,0.3);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #3b82f6;
            width: 0%;
            transition: width 0.3s ease;
        }

        #result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-card" id="main-card">
        <!-- Başlangıç Ekranı -->
        <div id="start-screen">
            <div class="z-20 flex flex-col items-center w-full">
                <div class="relative mb-4">
                    <img src="https://raw.githubusercontent.com/ecemyildizcan/mikrostop/main/asserts/kahraman.png" 
                         class="absolute -top-12 -left-12 w-20 h-20 bounce-kahraman" alt="Kahraman">
                    <h1 class="text-6xl md:text-7xl font-baloo-bold text-white drop-shadow-xl leading-none uppercase text-center">MİKROSTOP</h1>
                    <img src="https://raw.githubusercontent.com/ecemyildizcan/mikrostop/main/asserts/mikrop.png" 
                         class="absolute -top-12 -right-12 w-20 h-20 bounce-mikrop" alt="Mikrop">
                </div>
                
                <h2 class="text-3xl md:text-4xl font-baloo-bold text-blue-400 mb-8 tracking-tighter uppercase text-center">TEST MODU</h2>
                
                <input type="text" id="user-name" class="game-input" placeholder="Adınız" autocomplete="off">
                <input type="text" id="user-surname" class="game-input" placeholder="Soyadınız" autocomplete="off">

                <button onclick="startGame()" class="btn-game bg-blue-600 px-20 py-6 rounded-full text-4xl text-white shadow-[0_10px_0_rgb(29,78,216)] active:shadow-none mt-4">
                    BAŞLA
                </button>
            </div>
        </div>

        <!-- Soru Ekranı -->
        <div id="question-view">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="space-y-8">
                <div class="text-center">
                    <span id="question-num" class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold uppercase tracking-widest shadow-lg">SORU 1</span>
                </div>
                <h2 id="question-text" class="text-3xl md:text-4xl font-bold text-center px-4 text-white leading-tight">...</h2>
                <div id="options-container" class="grid grid-cols-1 gap-4 max-w-lg mx-auto w-full"></div>
            </div>
        </div>

        <!-- Final Ekranı -->
        <div id="result-screen">
            <div class="mb-6 text-center text-sm md:text-base text-slate-400 font-medium leading-relaxed">
                Test Tasarım:<br>
                Marmara Üniversitesi Sağlık Bilimleri Enstitüsü<br>
                Çocuk Sağlığı ve Hastalıkları Hemşireliği<br>
                Doç. Dr. Çağrı Çövener Özçelik<br>
                Buse Sarı
            </div>
            
            <h2 class="text-5xl md:text-6xl font-bold text-yellow-400 mb-6 uppercase">TAMAMLANDI</h2>
            <div class="text-8xl mb-8">✅</div>
            <div id="final-stats" class="text-xl md:text-2xl text-white mb-8 space-y-2 bg-slate-800/50 p-6 rounded-3xl border-2 border-white/10 w-full"></div>
            
            <div class="flex flex-col gap-4 w-full max-w-xs">
                <button onclick="downloadResults()" class="btn-game bg-amber-500 text-white px-10 py-5 rounded-2xl font-bold text-xl shadow-[0_6px_0_rgb(180,83,9)] uppercase">📊 RAPORU İNDİR</button>
                <button onclick="location.reload()" class="btn-game bg-green-600 text-white px-10 py-5 rounded-2xl font-bold text-xl shadow-[0_6px_0_rgb(22,101,52)] uppercase">YENİDEN BAŞLA</button>
            </div>
        </div>
    </div>

    <script>
        const questionsData = [
            { id: 1, q: "El yıkamanın temel amacı _________ kurtulmaktır.", opts: ["Kirden", "Kötü Kokudan", "Mikroplardan"], ans: "Mikroplardan" },
            { id: 2, q: "Ellerimizi sadece kirli görünce yıkamalıyız.", opts: ["DOĞRU", "YANLIŞ"], ans: "YANLIŞ" },
            { id: 3, q: "El yıkamaya başlamadan önce ellerimizi önce _________.", opts: ["Sabunlarız", "Kurularız", "Islatırız"], ans: "Islatırız" },
            { id: 4, q: "Tırnakların içi kir ve mikropla dolabilir, bu yüzden yıkanmalıdır.", opts: ["DOĞRU", "YANLIŞ"], ans: "DOĞRU" },
            { id: 5, q: "El yıkarken mikropların EN ÇOK saklandığı yer hangisidir?", opts: ["Avuç İçi", "Parmak Araları", "El Üstü"], ans: "Parmak Araları" },
            { id: 6, q: "Aşağıdakilerden hangisi doğru el yıkama sırasını gösterir?", opts: [
                "Sabunu al → Ellerini durula → Parmak aralarını temizle → Ellerini ıslat",
                "Ellerini ıslat → Sabunu al → Parmak aralarını temizle → Ellerini durula",
                "Ellerini durula → Sabunu al → Ellerini ıslat → Parmak aralarını temizle"
            ], ans: "Ellerini ıslat → Sabunu al → Parmak aralarını temizle → Ellerini durula" },
            { id: 7, q: "Ellerimizi yıkarken kaça kadar saymalıyız?", opts: ["5", "10", "15"], ans: "15" },
            { id: 8, q: "Elleri yıkarken sadece su kullanmak mikropları tamamen yok eder.", opts: ["DOĞRU", "YANLIŞ"], ans: "YANLIŞ" },
            { id: 9, q: "Sabunla el yıkadığımızda bizi hasta edebilen _________ mikroplar uzaklaşır.", opts: ["Kalıcı", "Geçici", "Yararlı"], ans: "Geçici" },
            { id: 10, q: "Elleri sabunlarken parmak aralarını birbirine sürtmek temizliği artırır.", opts: ["DOĞRU", "YANLIŞ"], ans: "DOĞRU" }
        ];

        let state = {
            firstName: "",
            lastName: "",
            currentIndex: 0,
            isProcessing: false,
            logs: []
        };

        function startGame() {
            const fName = document.getElementById('user-name').value.trim();
            const lName = document.getElementById('user-surname').value.trim();

            if (!fName || !lName) {
                alert("Lütfen isminizi ve soyisminizi girin!");
                return;
            }

            state.firstName = fName;
            state.lastName = lName;

            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('question-view').style.display = 'flex';
            
            renderQuestion();
        }

        function renderQuestion() {
            if (state.currentIndex >= questionsData.length) {
                endGame();
                return;
            }

            const q = questionsData[state.currentIndex];
            document.getElementById('question-num').innerText = `SORU ${state.currentIndex + 1}`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const colors = ['bg-blue-600', 'bg-indigo-600', 'bg-violet-600'];
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = `btn-game ${colors[i % 3]} text-white p-5 rounded-2xl font-bold text-xl shadow-[0_6px_0_rgba(0,0,0,0.3)]`;
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                container.appendChild(btn);
            });

            document.getElementById('progress-bar').style.width = `${(state.currentIndex / questionsData.length) * 100}%`;
        }

        function checkAnswer(selected) {
            if (state.isProcessing || state.currentIndex >= questionsData.length) return;
            state.isProcessing = true;
            
            const currentQ = questionsData[state.currentIndex];
            const isCorrect = selected.toUpperCase() === currentQ.ans.toUpperCase();

            // Puan her soru için 10 (doğruysa 10, yanlışsa 0)
            const scorePerQuestion = isCorrect ? 10 : 0;

            state.logs.push({
                "Ad": state.firstName,
                "Soyad": state.lastName,
                "Soru No": state.currentIndex + 1,
                "Cevap": selected,
                "Sonuç": isCorrect ? "DOĞRU" : "YANLIŞ",
                "Puan": scorePerQuestion,
                "Tarih": new Date().toLocaleString('tr-TR')
            });

            state.currentIndex++;
            state.isProcessing = false;
            renderQuestion();
        }

        function endGame() {
            document.getElementById('question-view').style.display = 'none';
            const resultScreen = document.getElementById('result-screen');
            resultScreen.style.display = 'flex';
            
            const stats = document.getElementById('final-stats');
            stats.innerHTML = `
                <p class="uppercase font-bold text-blue-400">Katılımcı: ${state.firstName} ${state.lastName}</p>
                <p class="mt-4">Testi başarıyla tamamladın!</p>
                <p class="text-sm text-slate-400">Sonuçlarını rapor olarak indirebilirsin.</p>
            `;
        }

        function downloadResults() {
            if (state.logs.length === 0) return;
            
            // JSON verisini çalışma sayfasına dönüştür
            const ws = XLSX.utils.json_to_sheet(state.logs);
            
            // Toplam puanı hesapla
            const totalScore = state.logs.reduce((sum, log) => sum + log.Puan, 0);
            
            // Excel'in en sonuna toplam puan satırı ekle
            // state.logs.length + 1 başlık dahil son satırın bir altı olur
            const lastRowIndex = state.logs.length + 1;
            
            // Toplam Puan etiketini ve değerini ekle (AOE - Array of Arrays formatı)
            XLSX.utils.sheet_add_aoa(ws, [
                ["", "", "", "", "TOPLAM PUAN:", totalScore]
            ], { origin: `A${lastRowIndex + 1}` });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Test Raporu");
            
            const now = new Date();
            const dateStr = `${now.getDate()}-${now.getMonth()+1}-${now.getFullYear()}`;
            const fileName = `${state.firstName}-${state.lastName}-${dateStr}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }
    </script>
</body>
</html>
